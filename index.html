<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Biker Church</title>
<meta name="theme-color" content="#7C5A3F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="app-icons/app-icon-192.png">
<link rel="icon" href="app-icons/app-icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Install Banner -->
<div id="installBanner" class="install-banner hidden">
    <span>📱 Install this app for a better experience.</span>

    <div class="install-buttons">
        <button id="installButton">Install</button>
        <button id="dismissInstall">Not now</button>
    </div>
</div>
  
<header class="site-header">
  <img id="banner-img" class="banner-img" alt="Club banner" style="display:none;">
  <div id="banner-fallback" class="banner-fallback"></div>
  <div class="header-titles">
    <p id="club-tagline" class="club-tagline"></p>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn" data-tab="tab-wall">Announcements</button>
  <button class="tab-btn active" data-tab="tab-calendar">Calendar</button>
</nav>

<main>
  <section id="tab-wall" class="tab-panel">
    <div id="wall-board" class="wall-board">
      <p class="empty-state">Loading…</p>
    </div>
  </section>

  <section id="tab-calendar" class="tab-panel active">
    <div id="calendar-list"></div>
  </section>
</main>

<footer class="site-footer">Biker Church</footer>

<div id="imageViewer" class="image-viewer hidden">
    <img id="fullImage" src="" alt="">
</div>
    
<script src="js/app.js"></script>
    
</body>
</html>
